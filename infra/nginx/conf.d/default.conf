server {
    listen 80;
    server_name localhost;

    client_max_body_size 16m;
    client_header_buffer_size 16k;
    large_client_header_buffers 8 32k;

    # Basic auth отключён для локальной разработки.
    # Включить снова: auth_basic + auth_basic_user_file (см. .htpasswd.example)

    # Gateway ops endpoints (не путать с n8n UI на /)
    location ~ ^/(health|metrics)(/ready)?$ {
        proxy_pass http://gateway:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Единая точка входа для внешних webhook'ов → FastAPI gateway.
    # Внутри Docker Payment_bot / Retry_runner ходят напрямую в n8n:5678.
    location /webhook/ {
        limit_req zone=webhook_ingress burst=20 nodelay;

        proxy_pass http://gateway:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # webhook'и снаружи сюда не попадают)
    location / {
        proxy_pass http://n8n:5678;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
