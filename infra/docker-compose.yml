# Неделя 2: queue mode — main принимает UI/webhook, workers выполняют workflow из Redis (Bull).

x-n8n-env: &n8n-env
  DB_TYPE: postgresdb
  DB_POSTGRESDB_HOST: postgres
  DB_POSTGRESDB_PORT: 5432
  DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
  DB_POSTGRESDB_USER: ${POSTGRES_USER}
  DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
  N8N_HOST: ${N8N_HOST}
  N8N_PORT: ${N8N_PORT}
  N8N_PROTOCOL: ${N8N_PROTOCOL}
  WEBHOOK_URL: ${WEBHOOK_URL}
  N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
  N8N_PROXY_HOPS: ${N8N_PROXY_HOPS}
  N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE}
  GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
  TZ: ${TZ}
  # Queue mode (Bull + Redis)
  EXECUTIONS_MODE: queue
  QUEUE_BULL_REDIS_HOST: redis
  QUEUE_BULL_REDIS_PORT: "6379"
  OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: "true"
  # Observability (неделя 6): Prometheus /metrics на n8n:5678/metrics
  N8N_METRICS: "true"
  N8N_METRICS_INCLUDE_DEFAULT_METRICS: "true"
  N8N_METRICS_INCLUDE_QUEUE_METRICS: "true"

x-n8n-common: &n8n-common
  image: n8nio/n8n:latest
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  environment:
    <<: *n8n-env
  volumes:
    - n8n_data:/home/node/.n8n

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Main: UI, webhooks, кладёт задачи в очередь Redis
  n8n:
    <<: *n8n-common
    expose:
      - "5678"

  # Workers: забирают задачи из очереди (масштабирование = больше таких контейнеров)
  n8n-worker-1:
    <<: *n8n-common
    command: worker

  n8n-worker-2:
    <<: *n8n-common
    command: worker

  n8n-worker-3:
    <<: *n8n-common
    command: worker

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - n8n
      - gateway
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro

  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      n8n:
        condition: service_started
    environment:
      WEBHOOK_HMAC_SECRET: ${WEBHOOK_HMAC_SECRET:-super_test_secret_123}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678/webhook/google-sheet}
      REDIS_URL: redis://redis:6379/0
      IDEMPOTENCY_TTL_SECONDS: ${IDEMPOTENCY_TTL_SECONDS:-86400}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
      REDIS_EXPORTER_CHECK_KEYS: dlq:webhooks:count
    expose:
      - "9121"

  loki:
    image: grafana/loki:3.3.2
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.3.2
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
      - redis
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: dark
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_INSTALL_PLUGINS: redis-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  postgres_data:
  n8n_data:
  redis_data:
  prometheus_data:
  loki_data:
  grafana_data:
