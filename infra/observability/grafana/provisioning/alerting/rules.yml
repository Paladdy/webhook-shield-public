apiVersion: 1

groups:
  - orgId: 1
    name: webhook-shield
    folder: webhook-shield
    interval: 1m
    rules:
      - uid: n8n-down
        title: n8n metrics down
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: up{job="n8n"}
              refId: A
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { params: [1], type: lt }
                  operator: { type: and }
                  reducer: { type: last }
              refId: C
        for: 30s
        noDataState: Alerting
        execErrState: Alerting
        annotations:
          summary: n8n /metrics недоступен более 30 секунд
        labels:
          severity: critical

      - uid: queue-high
        title: n8n queue waiting > 100
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: n8n_scaling_mode_queue_jobs_waiting
              refId: A
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: max
              refId: B
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { params: [100], type: gt }
                  operator: { type: and }
                  reducer: { type: max }
              refId: C
        for: 5m
        noDataState: OK
        execErrState: Alerting
        annotations:
          summary: Очередь n8n (waiting) > 100 более 5 минут
        labels:
          severity: warning

      - uid: gateway-down
        title: gateway metrics down
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: up{job="gateway"}
              refId: A
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { params: [1], type: lt }
                  operator: { type: and }
                  reducer: { type: last }
              refId: C
        for: 30s
        noDataState: Alerting
        execErrState: Alerting
        annotations:
          summary: FastAPI gateway /metrics недоступен более 30 секунд
        labels:
          severity: critical

      - uid: dlq-nonzero
        title: DLQ counter > 0
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: redis_key_value{key="dlq:webhooks:count"}
              refId: A
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { params: [0], type: gt }
                  operator: { type: and }
                  reducer: { type: last }
              refId: C
        for: 2m
        noDataState: OK
        execErrState: Alerting
        annotations:
          summary: В DLQ есть необработанные события (dlq:webhooks:count > 0)
        labels:
          severity: warning
